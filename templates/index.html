<!DOCTYPE html>
<html>
<head>
    <title>Dog vs Cat Classifier</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 32px;
        }

        .container {
            margin-top: 60px;
            background: white;
            color: black;
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .container:hover {
            transform: scale(1.02);
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea, #5a67d8);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .dog {
            color: green;
        }

        .cat {
            color: orange;
        }

        img {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 10px;
            display: none;
        }
    </style>

    <script>
        function previewImage(event) {
            const image = document.getElementById('preview');
            image.src = URL.createObjectURL(event.target.files[0]);
            image.style.display = "block";
        }
    </script>
</head>

<body>

    <h1>🐶 Dog vs 🐱 Cat Classifier</h1>

    <div class="container">
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" onchange="previewImage(event)" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        <img id="preview" />

        {% if prediction %}
            <div class="result 
                {% if 'Dog' in prediction %}dog{% else %}cat{% endif %}">
                {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
